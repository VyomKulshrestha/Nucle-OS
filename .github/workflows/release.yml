name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to attach binaries to"
        required: true
        default: "v0.1.0"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: nucle-cli-linux-x86_64
            bin_path: target/release/nucle-cli
          - os: windows-latest
            asset_name: nucle-cli-windows-x86_64.exe
            bin_path: target/release/nucle-cli.exe
          - os: macos-latest
            asset_name: nucle-cli-macos-x86_64
            bin_path: target/release/nucle-cli
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release -p nucle-cli
      - name: Stage binary
        shell: bash
        run: cp "${{ matrix.bin_path }}" "${{ matrix.asset_name }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Attach binaries to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: dist/*
